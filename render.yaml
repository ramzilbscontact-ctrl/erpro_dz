services:
  # Frontend → déployé sur Vercel (voir frontend/vercel.json)

  # ── Web API (Daphne ASGI — HTTP + WebSocket) ──────────────────────────────
  - type: web
    name: erpro-dz-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: USE_MONGOMOCK
        value: "False"
      - key: MONGO_DB
        value: erp_radiance
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: erpro-dz-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FRONTEND_URL
        sync: false  # À mettre manuellement = ton URL Vercel (ex: https://erpro-dz.vercel.app)
      - key: GOOGLE_CLIENT_ID
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: erpro-dz-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
