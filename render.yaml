services:
  # ── Frontend (React Static Site) ──────────────────────────────────────────
  - type: web
    name: erpro-dz-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_API_URL
        value: "https://erpro-dz-api.onrender.com"

  # ── Web API (Daphne ASGI — HTTP + WebSocket) ──────────────────────────────
  - type: web
    name: erpro-dz-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_MONGOMOCK
        value: "False"
      - key: MONGO_DB
        value: erp_radiance
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: erpro-dz-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FRONTEND_URL
        value: "https://erpro-dz-frontend.onrender.com"

  # ── Celery Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: erpro-dz-worker
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery worker --loglevel=info --concurrency=1
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: erp_radiance
      - key: USE_MONGOMOCK
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: erpro-dz-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: erpro-dz-api
          envVarKey: SECRET_KEY

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: erpro-dz-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
