<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b6ff0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3bed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b6ff0;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#3b6ff0;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#7c3bed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3bed;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Glow orbs background -->
  <circle cx="200" cy="200" r="180" fill="#3b6ff0" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="1000" cy="200" r="160" fill="#7c3bed" opacity="0.05" filter="url(#softglow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)" />

  <!-- Left decorative bracket -->
  <g fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.7">
    <polyline points="80,140 60,140 60,260 80,260" />
    <polyline points="1120,140 1140,140 1140,260 1120,260" />
  </g>

  <!-- Dot grid left -->
  <g fill="#3b6ff0" opacity="0.3">
    <circle cx="100" cy="170" r="2"/>
    <circle cx="116" cy="170" r="2"/>
    <circle cx="100" cy="186" r="2"/>
    <circle cx="116" cy="186" r="2"/>
    <circle cx="100" cy="202" r="2"/>
    <circle cx="116" cy="202" r="2"/>
    <circle cx="100" cy="218" r="2"/>
    <circle cx="116" cy="218" r="2"/>
    <circle cx="100" cy="234" r="2"/>
    <circle cx="116" cy="234" r="2"/>
  </g>

  <!-- Dot grid right -->
  <g fill="#7c3bed" opacity="0.3">
    <circle cx="1084" cy="170" r="2"/>
    <circle cx="1100" cy="170" r="2"/>
    <circle cx="1084" cy="186" r="2"/>
    <circle cx="1100" cy="186" r="2"/>
    <circle cx="1084" cy="202" r="2"/>
    <circle cx="1100" cy="202" r="2"/>
    <circle cx="1084" cy="218" r="2"/>
    <circle cx="1100" cy="218" r="2"/>
    <circle cx="1084" cy="234" r="2"/>
    <circle cx="1100" cy="234" r="2"/>
  </g>

  <!-- Main title ERPro DZ -->
  <text
    x="600" y="185"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="78"
    font-weight="700"
    letter-spacing="-2"
    text-anchor="middle"
    fill="url(#accentGrad)"
    filter="url(#glow)"
  >ERPro DZ</text>

  <!-- Separator line -->
  <rect x="340" y="205" width="520" height="2" fill="url(#lineGrad)" rx="1"/>

  <!-- Subtitle -->
  <text
    x="600" y="248"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="400"
    letter-spacing="6"
    text-anchor="middle"
    fill="#8899bb"
  >PLATEFORME ERP &amp; CRM ALGERIENNE</text>

  <!-- Tech stack pills -->
  <g transform="translate(600, 295)">
    <!-- Django pill -->
    <g transform="translate(-250, 0)">
      <rect x="-42" y="-14" width="84" height="28" rx="14" fill="#1a2a1a" stroke="#2d6a2d" stroke-width="1"/>
      <text x="0" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#4caf50" text-anchor="middle">Django 5.2</text>
    </g>
    <!-- MongoDB pill -->
    <g transform="translate(-140, 0)">
      <rect x="-46" y="-14" width="92" height="28" rx="14" fill="#1a2a1a" stroke="#2d6a2d" stroke-width="1"/>
      <text x="0" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#4caf50" text-anchor="middle">MongoDB</text>
    </g>
    <!-- DRF pill -->
    <g transform="translate(-28, 0)">
      <rect x="-36" y="-14" width="72" height="28" rx="14" fill="#1a1a2a" stroke="#2d3a7a" stroke-width="1"/>
      <text x="0" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#5c7cfa" text-anchor="middle">DRF</text>
    </g>
    <!-- Redis pill -->
    <g transform="translate(74, 0)">
      <rect x="-34" y="-14" width="68" height="28" rx="14" fill="#2a1a1a" stroke="#7a2d2d" stroke-width="1"/>
      <text x="0" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#ff5c5c" text-anchor="middle">Redis</text>
    </g>
    <!-- Celery pill -->
    <g transform="translate(168, 0)">
      <rect x="-36" y="-14" width="72" height="28" rx="14" fill="#1a1a2a" stroke="#5a2d7a" stroke-width="1"/>
      <text x="0" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#b07cfa" text-anchor="middle">Celery</text>
    </g>
    <!-- JWT pill -->
    <g transform="translate(256, 0)">
      <rect x="-28" y="-14" width="56" height="28" rx="14" fill="#2a2a1a" stroke="#7a6a2d" stroke-width="1"/>
      <text x="0" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#fac35c" text-anchor="middle">JWT</text>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="397" width="1200" height="3" fill="url(#accentGrad)" />

  <!-- Version tag -->
  <text
    x="1160" y="390"
    font-family="monospace"
    font-size="11"
    fill="#334466"
    text-anchor="end"
  >v1.0.0</text>

  <!-- DZ flag colors subtle accent left -->
  <rect x="0" y="3" width="6" height="197" fill="#006233" opacity="0.6"/>
  <rect x="0" y="200" width="6" height="197" fill="#ffffff" opacity="0.08"/>
</svg>
